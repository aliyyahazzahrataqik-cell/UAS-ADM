# Layanan database

services:
  db-webdinamis:
    image: mariadb:latest
    environment:
      MARIADB_ROOT_PASSWORD: password!123
      MARIADB_DATABASE: dbuas
      MARIADB_USER: alyauas046
      MARIADB_PASSWORD: uas123
    volumes:
      - dbdata:/var/lib/mysql
      - ./dbdata/dbuas.sql:/docker-entrypoint-initdb.d/dbuas.sql:ro
    restart: always

  container-statis:
    image: ${DOCKERHUB_USERNAME}/uas_aliyyah-azzahra-046:latest
    ports:
      - "80:80"
    restart: always

  container-dinamis:
    image: ${DOCKERHUB_USERNAME}/uas_dinamis_alya:latest
    ports:
      - "3000:3000"
    restart: always
    environment:
      DB_USER: alyauas046
      DB_PASSWORD: uas123
      DB_NAME: dbuas
      DB_HOST: db-webdinamis
      NEXTAUTH_SECRET: Aliyyah-Azzahra-Taqi-Kusuma-046
      NEXTAUTH_URL: http://47.131.250.223/:3000
    depends_on:
      - db-webdinamis

volumes:
  dbdata: {}